<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SearchX{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  {% if current_user %}
  <div class="global-user-bar">
    <span class="gub-name">{{ current_user.username }}</span>
    <span class="sl-role-badge sl-role-{{ current_user.role }}">{{ current_user.role }}</span>
    <a href="/account" class="gub-link">Account</a>
    <a href="/analytics" class="gub-link">Analytics</a>
    {% if current_user.role == 'admin' %}
    <a href="/settings" class="gub-link">Settings</a>
    <a href="/admin" class="gub-link">Admin</a>
    {% endif %}
    <a href="/logout" class="gub-link gub-logout">Sign out</a>
  </div>
  {% endif %}
  {% block body %}{% endblock %}
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
