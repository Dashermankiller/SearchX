# SearchX — Nginx reverse-proxy config
# ─────────────────────────────────────────────────────────────────────────
# QUICK SETUP (Ubuntu/Debian):
#
#   1. Edit the two lines marked EDIT below (SEARCHX_DIR and server_name).
#   2. sudo cp nginx.conf /etc/nginx/sites-available/searchx
#   3. sudo ln -sf /etc/nginx/sites-available/searchx /etc/nginx/sites-enabled/searchx
#   4. sudo rm -f /etc/nginx/sites-enabled/default   # remove default site
#   5. sudo nginx -t && sudo systemctl reload nginx
#
# Or just run:  ./run.sh --setup-nginx
# ─────────────────────────────────────────────────────────────────────────

worker_processes auto;
worker_rlimit_nofile 65535;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────
    log_format  main '$remote_addr "$request" $status $body_bytes_sent ${request_time}s';
    access_log  /var/log/nginx/searchx_access.log main buffer=32k flush=5s;
    error_log   /var/log/nginx/searchx_error.log warn;

    # ── Transport ─────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75;
    keepalive_requests 10000;
    types_hash_max_size 4096;
    server_tokens      off;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip             on;
    gzip_vary        on;
    gzip_proxied     any;
    gzip_comp_level  5;
    gzip_min_length  1024;
    gzip_buffers     16 8k;
    gzip_types
        text/plain text/css text/javascript text/xml text/x-component
        application/json application/javascript application/xml
        image/svg+xml font/ttf font/otf;

    # ── Rate limiting ─────────────────────────────────────────────────────
    # /search   — expensive DB queries; 30 req/min per IP, burst 20
    limit_req_zone $binary_remote_addr zone=search_rl:20m  rate=30r/m;
    # /api/*    — lighter endpoints; 120 req/min per IP, burst 40
    limit_req_zone $binary_remote_addr zone=api_rl:10m     rate=120r/m;
    limit_req_status 429;

    # ── Proxy cache (optional — stores HTML responses on disk) ────────────
    # Uncomment to enable; creates a 1 GB disk cache with 1-min TTL.
    # proxy_cache_path /var/cache/nginx/searchx levels=1:2 keys_zone=sx_cache:10m
    #                  max_size=1g inactive=5m use_temp_path=off;

    # ── Upstream ──────────────────────────────────────────────────────────
    upstream searchx_app {
        server 127.0.0.1:5000;
        keepalive 64;
    }

    # ── Common proxy headers ───────────────────────────────────────────────
    # (replaces the Ubuntu /etc/nginx/proxy_params file so this config is
    #  portable to any Linux distro)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name _;          # EDIT: replace _ with your domain or IP

        client_max_body_size 50m;
        client_body_timeout  60s;
        send_timeout         60s;

        # ── Health check (no rate limit — used by load balancers) ─────────
        location = /api/health {
            proxy_pass http://searchx_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }

        # ── Static files — served by Nginx, never hit Python ─────────────
        location /static/ {
            alias SEARCHX_DIR/static/;   # EDIT: set SEARCHX_DIR to your path
            expires 7d;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
            access_log off;
        }

        # ── Search — rate limited ─────────────────────────────────────────
        location /search {
            limit_req zone=search_rl burst=20 nodelay;
            proxy_pass http://searchx_app;
            proxy_http_version 1.1;
            proxy_set_header Connection        "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;

            # Optional: enable HTML caching
            # proxy_cache        sx_cache;
            # proxy_cache_valid  200 1m;
            # proxy_cache_use_stale error timeout updating;
            # add_header X-Cache-Status $upstream_cache_status;
        }

        # ── API — rate limited ────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_rl burst=40 nodelay;
            proxy_pass http://searchx_app;
            proxy_http_version 1.1;
            proxy_set_header Connection        "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Everything else ───────────────────────────────────────────────
        location / {
            proxy_pass http://searchx_app;
            proxy_http_version 1.1;
            proxy_set_header Connection        "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
